<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="form.css">
    <title>Form</title>
</head>
<body>
    
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder=" example@gmail.com"/>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder=" Password (qwerty)">
        </div>
    
        <button type="submit">Login con FormData</button>
        <button type="button" id="directAccess">Login con Accesso Diretto</button>
    </form>

    <div id="result"></div>
    <script src="form.js"></script>
</body>
</html>
