<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Form</title>
</head>
<body>
    <form id="loginForm">
        
        <div id="loginText">
            <span>LOGIN</span>
        </div>

        <div class="fieldForm">
            <input type="email" class="email input" name="email" placeholder="Email"/>
        </div>

        <div class="fieldForm">    
            <input type="password" class="password input" name="password" placeholder="Password">
        </div>
        <div><span class="errorMessage errorMessagePassword"></span></div>
        <button type="submit" id="submitBtn">Invia</button>
    </form>

    <div><span class="errorMessage"></span></div>
    <script src="index.js"></script>
</body>
</html>
